services:
  ncm-api:
    image: moefurina/ncm-api:latest
    environment:
      # 灰歌解锁(从 QQ/酷狗/酷我/咪咕等找同名歌替换)。默认关;.env 设 ENABLE_UNBLOCK=true 开启。
      - ENABLE_GENERAL_UNBLOCK=${ENABLE_UNBLOCK:-false}
    restart: unless-stopped
  app:
    build:
      context: .
    depends_on: [ncm-api]
    ports: ["${APP_PORT:-80}:80"]        # 端口被占用可在 .env 设 APP_PORT=8080 等
    environment:
      - NCM_BASE=http://ncm-api:3000
      - NCM_MUSIC_U=${NCM_MUSIC_U}
      - COOKIE_PATH=/data/cookie
      # 区域解锁:开启后后端自动注入随机中国 IP(realIP),解掉海外变灰的有版权歌
      - REGION_UNLOCK=${REGION_UNLOCK:-false}
    volumes:
      - cookie-data:/data
    restart: unless-stopped

  # 可选一:固定地址的 Cloudflare 隧道(需要一个加到 Cloudflare 的域名)。
  # 在 .env 填 CLOUDFLARE_TUNNEL_TOKEN 后:docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on: [app]
    restart: unless-stopped

  # 可选二:免域名的快速隧道(给一个临时 https 地址,重启才会变)。
  # 启动:docker compose --profile quick up -d
  # 拿地址:docker compose logs cloudflared-quick | grep trycloudflare
  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    profiles: ["quick"]
    command: tunnel --no-autoupdate --url http://app:80
    depends_on: [app]
    restart: unless-stopped

volumes:
  cookie-data:
