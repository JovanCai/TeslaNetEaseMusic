services:
  ncm-api:
    image: moefurina/ncm-api:latest
    environment:
      - ENABLE_GENERAL_UNBLOCK=false
    restart: unless-stopped
  app:
    build:
      context: .
      args:
        VITE_REAL_IP: ${VITE_REAL_IP}
    depends_on: [ncm-api]
    ports: ["${APP_PORT:-80}:80"]        # 端口被占用可在 .env 设 APP_PORT=8080 等
    environment:
      - NCM_BASE=http://ncm-api:3000
      - NCM_MUSIC_U=${NCM_MUSIC_U}
      - COOKIE_PATH=/data/cookie
    volumes:
      - cookie-data:/data
    restart: unless-stopped

  # 可选:Cloudflare 隧道(公网 https 地址,无需公网 IP)。
  # 在 .env 填 CLOUDFLARE_TUNNEL_TOKEN 后,用 --profile tunnel 启动即生效。
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on: [app]
    restart: unless-stopped

volumes:
  cookie-data:
